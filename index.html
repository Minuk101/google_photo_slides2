<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google Photos Slideshow</title>
    <link rel="stylesheet" href="style.css?v=10">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="manifest" href="manifest.json">
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
        }
    </script>
</head>
<body>
    <button id="login-btn">로그인하고 슬라이드 시작</button>
    <button id="add-btn" onclick="addMorePhotos()">사진 더 추가하기</button>
    <button id="reset-btn" onclick="resetPhotos()">초기화</button>
    <div id="slideshow" style="display:none;">
        <img id="bg1" class="bg-layer">
        <img id="bg2" class="bg-layer">
        <img id="img1" class="main-img">
        <img id="img2" class="main-img">
    </div>
    <button id="cache-status" type="button" aria-live="polite"></button>
    <div id="heartbeat">0</div>
    <script src="slideshow_v3.js?v=49"></script>
    <script>
        document.addEventListener("click", (event) => {
            if (event.target.closest("button")) return;
            if (!document.fullscreenElement && document.getElementById("slideshow").style.display !== "none") {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        });
    </script>
</body>
</html>
